on:
  workflow_call: {}

jobs:
    model_training:
        runs-on: ubuntu-latest
        steps:
        -   name: Checkout code
            uses: actions/checkout@v4

        -   name: Set up Python
            uses: actions/setup-python@v6
            with:
                python-version: '3.11'

        -   name: Install dependencies
            run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

        -   name: Download Processed Data
            uses: actions/download-artifact@v8
            with:
                name: processed-data
                path: data/processed/

        -   name: Start MLFlow
            run: |
                docker pull ghcr.io/mlflow/mlflow:latest
                docker run -d -p 5555:5000 --name mlflow-server ghcr.io/mlflow/mlflow:latest
                mlflow server --host 0.0.0.0 \
                    --backend-store-uri sqlite:///mlflow.db \
                    --default-artifact-root /tmp/mlruns

        -   name: Train Model
            run: |
                python src/model/train_model.py \
                    --config configs/model_config.yaml \
                    --data data/processed/featured_house_data.csv \
                    --models-dir models \
                    --mlflow-tracking-url http://localhost:5555

        -   name: Upload Trained Model
            uses: actions/upload-artifact@v7
            with:
                name: trained-model
                path: models/

        -   name: Stop MLFlow
            run: |
                docker stop mlflow-server
                docker rm mlflow-server
                docker rmi ghcr.io/mlflow/mlflow:latest